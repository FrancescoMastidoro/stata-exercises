name: Daily Stata Exercise

on:
  schedule:
    - cron: '0 7 * * *'  # 9am Rome (CEST, UTC+2); 8am in winter (CET)
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: Generate exercise and feedback
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/generate_exercise.py

      - name: Commit and push
        run: |
          git config user.name "Daily Stata Agent"
          git config user.email "actions@github.com"
          git add exercises/ feedback/ progress/ solutions/ || true
          git diff --cached --quiet || git commit -m "$(cat /tmp/commit_message.txt)"
          git push
